name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Lint hooks and mining scripts
        shell: pwsh
        run: |
          $targets = @(
            '.claude/hooks/post-tool.ps1',
            '.claude/hooks/pre-bash.ps1',
            '.claude/skills/chain-miner/scripts/mine.ps1',
            '.claude/skills/journal-anchor/scripts/append.ps1',
            '.claude/skills/self-benchmark/scripts/benchmark.ps1',
            '.claude/skills/safe-bash/scripts/run.ps1',
            '.claude/skills/pdf-read/scripts/extract.ps1',
            '.claude/skills/doc-convert/scripts/pandoc.ps1',
            '.claude/hooks/boot-validation.ps1',
            '.claude/hooks/tests/test-post-tool-fallback.ps1',
            '.claude/hooks/tests/test-boot-validation.ps1'
          ) | Where-Object { Test-Path $_ }

          $results = foreach ($t in $targets) {
            Write-Host "::group::$t"
            $r = Invoke-ScriptAnalyzer -Path $t -Severity Error,Warning
            $r | Format-Table -AutoSize | Out-Host
            Write-Host "::endgroup::"
            $r
          }

          # Treat Errors as CI failures. Warnings print but do not fail.
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) {
            Write-Host "::error::PSScriptAnalyzer found $($errors.Count) error(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: 0 errors."

      - name: Run post-tool fallback regression test
        shell: pwsh
        run: |
          if (Test-Path .claude/hooks/tests/test-post-tool-fallback.ps1) {
            pwsh -NoProfile -File .claude/hooks/tests/test-post-tool-fallback.ps1
          } else {
            Write-Host "::warning::Fallback test script missing"
          }

      - name: Run boot-validation regression test
        shell: pwsh
        run: |
          if (Test-Path .claude/hooks/tests/test-boot-validation.ps1) {
            pwsh -NoProfile -File .claude/hooks/tests/test-boot-validation.ps1
          } else {
            Write-Host "::warning::Boot-validation test script missing"
          }

      - name: Boot-validation smoke test against example settings
        shell: pwsh
        run: |
          # Materialize a clean fixture so the 'no literal placeholder dir' check passes
          # (the repo itself may carry a legacy ${CLAUDE_PROJECT_DIR}/ directory during the
          # transition). Example settings define the known-good wired config.
          $fixture = Join-Path ([System.IO.Path]::GetTempPath()) "morty-ci-smoke-$(New-Guid)"
          New-Item -ItemType Directory -Path $fixture -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $fixture 'logs') -Force | Out-Null
          foreach ($s in 'first-principles','journal-anchor','safe-bash','checkpoint-writer') {
            $sd = Join-Path $fixture ".claude/skills/$s"
            New-Item -ItemType Directory -Path $sd -Force | Out-Null
            Set-Content -Path (Join-Path $sd 'SKILL.md') -Value "---`nname: $s`n---`n"
          }
          # Drop a minimal wired settings.json into the fixture
          $minimal = @{
            hooks = @{
              PostToolUse = @(@{ matcher='.*'; hooks=@(@{ type='command'; command='x' }) })
            }
            env = @{ MORTY_MODEL = 'ci-smoke' }
          } | ConvertTo-Json -Depth 10
          $settings = Join-Path $fixture 'settings.json'
          Set-Content -Path $settings -Value $minimal
          $env:CLAUDE_PROJECT_DIR = $fixture
          $env:MORTY_MODEL = 'ci-smoke'
          pwsh -NoProfile -File .claude/hooks/boot-validation.ps1 -ProjectRoot $fixture -SettingsPath $settings -Strict

  check-hygiene:
    name: Hygiene checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Forbid machine-specific Windows paths
        run: |
          set -e
          # Scan tracked config + scripts + docs for hard-coded paths retired in PR #23.
          # Exclude the guardrail files themselves (they must reference the forbidden
          # patterns to define/document the rule) and archived case studies under
          # .claude/cases/ (historical evidence of the bug, not live config).
          if git grep -nE 'C:/(work/harness-sandbox|Users/AMD)' -- \
               '*.json' '*.ps1' '*.md' '*.yaml' '*.yml' '*.sh' \
               ':(exclude).github/workflows/ci.yml' \
               ':(exclude).githooks/pre-commit' \
               ':(exclude)CONTRIBUTING.md' \
               ':(exclude).claude/cases/**' 2>/dev/null; then
            echo "::error::Hard-coded Windows paths detected. Use \${CLAUDE_PROJECT_DIR}."
            exit 1
          fi
          echo "No hard-coded Windows paths."

      - name: Forbid tracked runtime journal
        run: |
          if git ls-files | grep -E '^logs/.*\.jsonl$'; then
            echo "::error::logs/*.jsonl is runtime state and must not be tracked."
            exit 1
          fi
          echo "No tracked .jsonl under logs/."

      - name: Forbid tracked settings.local.json
        run: |
          if git ls-files | grep -q '^\.claude/settings\.local\.json$'; then
            echo "::error::.claude/settings.local.json must remain untracked (per-clone state)."
            exit 1
          fi
          echo "settings.local.json is not tracked."

      - name: Forbid tracked _tmp_ scripts under logs/
        run: |
          if git ls-files | grep -E '^logs/_tmp_.*\.ps1$'; then
            echo "::error::logs/_tmp_*.ps1 scripts must not be committed (promote to a skill instead)."
            exit 1
          fi
          echo "No tracked _tmp_ scripts under logs/."

      - name: Forbid literal ${CLAUDE_PROJECT_DIR} path components
        run: |
          # A directory literally named '${CLAUDE_PROJECT_DIR}' means a hook/skill wrote
          # to the unexpanded placeholder string. Boot-validation will also catch this
          # at runtime, but we guard against committing such paths into the repo.
          if git ls-files | grep -F '${CLAUDE_PROJECT_DIR}'; then
            echo "::error::Tracked files contain a literal \${CLAUDE_PROJECT_DIR} path component. A script wrote to the unexpanded placeholder."
            exit 1
          fi
          echo "No literal \${CLAUDE_PROJECT_DIR} path components tracked."
