# Destructive patterns (regex, case-insensitive).
# Editing this file is a deliberate act — Morty cannot override at runtime.
patterns:
  - "rm\\s+-rf\\s+[/\\*]"
  - "Remove-Item.*-Recurse.*-Force"
  - "Remove-Item.*-Force.*-Recurse"
  - "\\brd\\s+/s\\b"
  - "\\brmdir\\s+/s\\b"
  - "\\bdel\\s+/s\\b"
  - "\\bformat\\s+[a-zA-Z]:"
  - "\\bdiskpart\\b"
  - "\\bcipher\\s+/w\\b"
  - "\\bsc\\s+delete\\b"
  - "\\bStop-Computer\\b"
  - "\\bRestart-Computer\\b"
  - "\\bshutdown\\b"
  - "\\blogoff\\b"
  - "\\breg\\s+delete\\b"
  - "Remove-ItemProperty.*HKLM"
  - "New-ItemProperty.*HKLM"
  - "Set-ItemProperty.*HKLM"
  - "\\bInvoke-Expression\\b"
  - "\\biex\\b"
  - "Invoke-WebRequest.*\\|\\s*iex"
  - "\\birm\\b.*\\|\\s*iex"
  - "curl\\b.*\\|\\s*(sh|bash|pwsh|powershell)"
  - "wget\\b.*\\|\\s*(sh|bash|pwsh|powershell)"
  - "Invoke-RestMethod.*\\|\\s*Invoke-Expression"
  - "\\bbcdedit\\b"
  - "\\bcacls\\b"
  - "icacls\\s+.*\\s+/grant\\s+Everyone"
  - "\\btakeown\\b"
  - "net\\s+user\\s+.*\\s+/add"
  - "net\\s+localgroup\\s+administrators"
  - "\\bAdd-LocalGroupMember\\b"
  - "\\bNew-LocalUser\\b"
  - "\\bDisable-WindowsOptionalFeature\\b"
  - "Set-ExecutionPolicy\\s+Unrestricted"
  - "Set-ExecutionPolicy\\s+Bypass\\s+-Scope\\s+LocalMachine"
  - "attrib\\s+-r\\s+-s\\s+-h"
  - "git\\s+push\\s+--force"
  - "git\\s+push\\s+-f\\b"
  - "git\\s+reset\\s+--hard\\s+origin"
  - "git\\s+clean\\s+-fdx"
  - "git\\s+filter-branch"
  - "git\\s+reflog\\s+expire"
